name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel a deploy mid-flight, but skip queued runs in favor of the latest
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install

      # base_path is "/<repo>" for project sites, "" for user sites and
      # custom domains — links adapt automatically via HtmlBasePlugin
      - name: Build site
        run: npm run build -- --pathprefix "${{ steps.pages.outputs.base_path }}/"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
